name: Stale Issue Management

on:
  schedule:
    # Run every Monday at 00:00 UTC
    - cron: "0 0 * * 1"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Manage Stale Issues and PRs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/stale@v10
        with:
          # Issue settings
          stale-issue-message: >
            This issue has been inactive for 60 days and has been marked as stale.
            It will be closed in 14 days unless there is new activity.
            If this issue is still relevant, please leave a comment explaining why.
          days-before-issue-stale: 60
          days-before-issue-close: 14
          stale-issue-label: "stale"
          exempt-issue-labels: "priority: high,security,pinned"

          # PR settings
          stale-pr-message: >
            This pull request has been inactive for 30 days and has been marked as stale.
            It will be closed in 14 days unless there is new activity.
            If you're still working on this, please push an update or leave a comment.
          days-before-pr-stale: 30
          days-before-pr-close: 14
          stale-pr-label: "stale"
          exempt-pr-labels: "priority: high,security"

          # General settings
          remove-stale-when-updated: true
          operations-per-run: 30
