name: Welcome New Contributors

on:
  pull_request_target:
    types: [opened]
  issues:
    types: [opened]

permissions:
  issues: write
  pull-requests: write

jobs:
  welcome:
    name: Welcome First-Time Contributors
    runs-on: ubuntu-latest
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: |
            Welcome to RoundTable Framework! Thank you for opening your first issue.

            A maintainer will review this shortly. While you wait:
            - Check our [Contributing Guide](https://github.com/VarakornUnicornTech/unicorn_roundtable_framework_repo/blob/main/CONTRIBUTING.md)
            - Read the [Code of Conduct](https://github.com/VarakornUnicornTech/unicorn_roundtable_framework_repo/blob/main/CODE_OF_CONDUCT.md)
            - Browse [Discussions](https://github.com/VarakornUnicornTech/unicorn_roundtable_framework_repo/discussions) for common questions

            Thank you for helping improve RoundTable Framework!
          pr-message: |
            Welcome to RoundTable Framework! Thank you for your first pull request.

            A maintainer will review it shortly. Please make sure you've:
            - [ ] Read the [Contributing Guide](https://github.com/VarakornUnicornTech/unicorn_roundtable_framework_repo/blob/main/CONTRIBUTING.md)
            - [ ] Completed the PR checklist in the template
            - [ ] Tested your changes locally with Claude Code

            We appreciate your contribution!
